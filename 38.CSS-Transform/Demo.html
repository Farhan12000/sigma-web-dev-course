<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrap">
        <div class="box">
            <div class="blue scaleX">
                scaleX
            </div>
        </div>
        <!-- scaleY -->
         <div class="box">
            <div class="blue scaleY">
                scaleY
            </div>
        </div>
        <!-- scale xY -->
         <div class="box">
            <div class="blue scale">
                scale
            </div>
        </div>
        <!-- translate X -->
         <div class="box">
            <div class=" blue translateX">
                tanslate X
            </div>
        </div>
        <!-- traslate Y -->
         <div class="box">
            <div class="blue translateY">
                tanslate Y
            </div>
        </div>
        <!--Translate XY  -->
        <div class="box">
            <div class="blue translate">
                tanslate 
            </div>
        </div>
        <!-- Matrix -->
         <div class="box">
            <div class="blue matrix">
                matrix
            </div>
        </div>
        <!-- rotate -->
         <div class="box">
            <div class="blue rotate">
                Rotate
            </div>
        </div>
        <!-- Skew -->
          <div class="box">
            <div class="blue skew">
                skew
            </div>
        </div>
        <!-- skew X -->
          <div class="box">
            <div class="blue skewx">
                SkewX
            </div>
        </div>
        <!-- skew Y -->
         <div class="box">
            <div class="blue skewy">
                SkewY
            </div>
        </div>
        <!-- matrix3d -->
         <div class="box">
            <div class="blue matrix3D">
                matrix3D
            </div>
        </div>
         <!-- translate3d -->
          <div class="box">
            <div class="blue translate3d">
                translate 3d
            </div>
        </div>
        <!--  rotate X rotate Y-->
           <div class="box">
            <div class=" blue rotateX">
                RotateX
            </div>
        </div>

         <div class="box">
            <div class="blue rotateY">
                RotateY
            </div>
        </div>
        <!-- translate z -->
          <div class="box">
            <div class=" blue translateZ">
                translate Z
            </div>
        </div>
    </div>
    
</body>
</html>
