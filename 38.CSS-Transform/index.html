<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform</title>
    <style>
        body{
            display: flex;
            justify-content:center;
            align-items: center;
        }
        .box{
            width: 50px;
            height: 50px;
            border: 2px solid black;
            background-color: aquamarine;
           transform: rotate(100deg);
           transform-origin: 0% 0%;
          /*  transform: rotateZ(9deg); */
         /* transform: skewY(34deg);*/
         /*transform: translateY(100%) skewY(40deg) translate(45%);*/
            display: flex;
            justify-content: center;
            align-items: center;

        }
        .container{
            width: 60%;
            height: 300px;
            border: 2px solid red;
            
        } 
        



    </style>
    

</head>
<body>
    <div class="container">
        <div class="box">
            box
        </div>



    </div>

    
</body>
</html>
