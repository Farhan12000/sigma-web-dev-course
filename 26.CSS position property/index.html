<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            border: 2px solid black;
            padding: 3px;
            width: 80vw;
            height: 433px;
            margin:3px ;
        }
        .box1{
            background-color: aqua;
            position: sticky;
            top: 0px;
            height: 111PX;
            width: 100%;
            margin: 0;
            padding: 0;
           /* position: absolute;
            top: 0px;
            left: 0px;
            z-index: 0;*/
         
            
        }
        .box2{
            background-color: aquamarine;
            /* position: relative;*/
            top: 0px;
            left: 44px;
            
        }
        .box3{
            background-color: bisque;
            /*position: fixed;
            bottom: 0px;
            left: 8vw;
            height: 133px;*/
           
        }
        .box4{
            background-color: blueviolet;
            /* position: relative;*/
            top: 0px;
            left: 144px;
             z-index: 1;
        }
        
        
        .parent{
            margin: 43px;
            padding: 34px;
            border: 3px solid purple;
            background-color: brown;
            /*transform ,filter , or prespective properties can also make an element appear as appointed */
           /* position: absolute;*/
           /*: translate(0);*/
           filter: invert(0);
           perspective: 0em;
        }
    </style>
</head>
<body>
    <div class="parent">
    <div class="box box1"><h1>FARHAN THE CODER</h1></div>
    <div class="box box2"><h2>This is look like so Amazing properties</h2></div>
    <div class="box box3"><h3>looking forward to make beautiful websites using this properties</h3></div>
    <div class="box box4"><h4>see you soon</h4></div>
    </div>
    
</body>
</html>
