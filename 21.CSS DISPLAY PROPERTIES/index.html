<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS DISPLAY PROPERTIES</title>
    <style>
    *{
        margin: 0;
        padding:0;
    }
    .box{
        border: 2px solid blue;
        padding: 45px;
        display: inline-block; 
        margin: 34px;
        width: 344px;
        display: grid;
         justify-content: center;
    }
    .box1{
        display: none;
        display: inline-flex;
        justify-content: center;
        display: grid;
    }
    
    </style>
</head>
<body>
<div class="box box1"> I am good Boy </div>
<div class="box">My name is farhan</div>
<span class="box"> I am doing good right now</span>
    
</body>
</html>
