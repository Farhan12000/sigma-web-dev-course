<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UltraEdit Navbar</title>
  <style>
    /* Reset */
 body{
    margin: 0;
    padding: 0;
 }
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Header */
header {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 20px 40px;
}

/* Logo Section */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* UL box */
.ul {
  background-color: #1a1a1a;
  color: gold;
  font-weight: bold;
  padding: 10px;
}

/* Text beside UL */
.text {
  display: flex;
  flex-direction: column;
}

.text h1 {
  font-size: 24px;
}

.text p {
  font-size: 14px;
  color: gray;
}

/* Navigation (RIGHT SIDE) */
.nav {
  display: flex;
  gap: 30px;
  list-style: none;
  margin-left: auto;  /* 🔥 main magic */
}

.nav li {
  cursor: pointer;
}
.boxex1 {
    background-color:white;
    height: 50px;
    width: 60%;
    text-align: center;
    margin: 10px 0;
    padding: 20px;
    font-size: 35px;
    }
    .boxex2 {
    background-color:white;
    height: 50px;
    width: 60%;
    text-align: center;
    margin: 10px 0;
    padding: 20px;
    font-size: 20px;
    }
    .boxex3 {
    background-color:rgb(151, 12, 225);
    height: 60px;
    width: 20%;
    text-align: center;
    margin: 10px 0;
    padding: 20px;
    }
    .box{
        display: flexbox;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        display: flex;
        font-size: 15px;
    }




  </style>
</head>
<body>

  <header>

    <!-- LEFT SIDE (Logo + Text) -->
    <div class="logo">
      <div class="ul">UL</div>

      <div class="text">
        <h1>UltraEdit</h1>
        <p>An Idea Inc Company</p>
      </div>
    </div>

    <!-- RIGHT SIDE (Menu) -->
    <ul class="nav">
      <li>Product</li>
      <li>Pricing</li>
      <li>Resource</li>
      <li>About us</li>
    </ul>

  </header>
  <div class="box">
    <div class="boxex1">1.
        Download UltraEdit For Windows
    </div>
    <div class="boxex2">2.
        download and try UltraEdit before you buy it! This download includes the 
        full windows version of the text editor
    </div>
    <div class="boxex3">
        3.Download Mac and linux version
    </div>
  </div>

</body>
</html>
