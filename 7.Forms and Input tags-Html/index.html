<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - lets learn it</title>
</head>
<body>
    <h1>Form to Apply for Web development</h1>
    <form action="post">
    <div>
        <label for="username">Enter your Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" autofocus>
    </div>
    <div>
        <input type="radio" id ="male" name="gender" value="Male">
        <label for="male">Male</label>
        <input type="radio" id ="female" name="gender" value="Female">
        <label for="female">Female</label>
    </div>
    <div>
        <input type="checkbox" name="subscribe" id="subscribe" value="yes">
        <label for="Subscribe">Subscribe for newletter</label>
    </div>
    <div>
        <label for="Comment">Enter your comment...</label>
        <textarea id="comment" name="comment" cols="50" rows="4"></textarea>
    </div>
    <div>
        <select name="Fruits">
           <option value="orange">Orange</option>
           <option value="banana">Banana</option>
           <option value="apple">Apple</option>
        </select>
    </div>
    </form>
</body>
</html>
