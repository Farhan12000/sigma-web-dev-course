<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-ANIMATION</title>
    <style>
        .container{
            background-color: rgb(11, 196, 60);
            width: 30vw;
            height: 80vh;

        }
        .box{
            width: 34px;
            height: 45px;
            background-color: aqua;
           /* animation: farhankaAnimation;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-cubic-bezier(0,0,0,0.96);
            animation-delay: 5s;
            animation-direction: normal;
            animation-play-state: paused;*/
            animation: farhankaAnimation 3s ease-in-out 3s 1 backwards,
                       farhan2 3s ease-in-out 3s 1  ;
        
        }

        @keyframes farhankaAnimation{
            from{
                background-color: red;

            }
            to{
                transform: translate(500px);
                background-color: yellow;
            }

        }
        @keyframes farhan2{
            0%{
                transform: rotate(100deg);
            }
            20%{
                 transform: rotate(200deg);
            }
            
            50%{
                 transform: rotate(220deg);
            }
            
            80%{
                 transform: rotate(300deg);
            }
            
            100%{
                 transform: rotate(310deg);
            }
            
            
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            box
        </div>

    </div>
    
</body>
</html>
