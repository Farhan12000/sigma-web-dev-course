<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout design</title>
    <style>
           body{
            background-color: red;
        }
        @media scree and (orientation: portrait){
            body{
                border: 2px solid purple;
            }
        }


        @media only screen and (max-width : 455px){
            body{
              background-color : rgb(126, 126, 196) ; 
            }
            .boxes{
                flex-direction: column;
                
            }
        }
        body{
            margin: 0;
            padding: 0;
            background-color:rgb(238, 239, 235);

        }
    

        body{
            display: flex;
            flex-direction:column;
            width: 100%;
            height: auto;
            transform: none;
            padding: 10px;

        }
                

        nav{
            border: 2px solid black;
            width: 100vh;
            height: 10vh;
            align-items: center;
            display: flex;
            justify-content: center;
            width: 50%;
            margin-left: auto;
            margin-right: auto;    
        }
        .box{
            border: 1px solid black;
            width: 100%;
            height: 70vh;
            margin-top: 0;
            background-color: aquamarine;
            
        }
        .boxtop{
            background-color: palevioletred;
            width: 100%;
            height: 20vh;
        }
        .box1{
            border: 2px solid black;
            margin-right: 90px;
            margin-left: auto;
            width: 35%;
            height: 50vh;
            background-color: brown;
        }
        .box2{
            border: 2px solid black;
            margin-right: 90px;
            margin-left: auto;
            width: 35%;
            height: 50vh;
            background-color: blueviolet;

            
           
        }
        .bottom{
            margin-top:  0;
            width: 75%;
            height: 240px;
            width: 100%;
            margin: 15px auto ;
            text-align: center;
        }
        .main{
            transform: scale(0.8);
            transform-origin: top center;
            display: flex;
            flex-direction: column;
            height: auto;
            padding: 10px;
            transform: none;
            background-color: bisque;
        
        }
        .last{
            border: 2px solid black;
             margin: auto;
             margin-top: 5px;
             border-radius: 25px;
            width : 90%;
            text-align: center;
            background-color: rgb(167, 133, 199);
            
            height: 159px;
        }
         .end{ 
            border: 1px solid black;
             margin-top: 0;
            width : 100%;
            height: 60px;
            background-color:darkgrey;

          }
        
       
            




    </style>
</head>
<body>
    <div class="main">
    <nav class="boxtop">
        this is upper side


    </nav>
    <nav class="box">

        
        <div class="box1">
            this is box1  
        </div>
        <div class="box2">
            this left box
        </div>
    </nav>
    <nav class="bottom">
         <div class="last"> 
             <h1>
                Welcome to My Website
                     made by
                  Farhan khan.com 
            </h1>
        
        

    </div>     
    </nav>
    <div class="end">
            

        </div>


    </div>

    </div>
    
    
</body>
</html>
