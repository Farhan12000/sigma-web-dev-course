<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi color Website</title>
    <style>
        :root{
            --primary-color:#7c27cbcc ;
            --text-color: rgb(169, 112, 121);
            --secondry-color:white;
            --accent-color: #cdaaebcc;
        }
        /*:root{
            --primary-color:rgb(105, 40, 40) ;
            --text-color: rgb(197, 142, 142);
            --secondry-color:white;
            --accent-color: rgb(232, 183, 183);
        } */
        body{
            background-color: var(--accent-color);
        }
        html{
            scroll-behavior: smooth;
        }



        *{
            margin: 0;
            padding: 0;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        }
        nav{
            background-color: var(--primary-color);
            padding: 12px 0;



        }
        ul li {
            list-style: none;
            display: inline;
            padding: 23px ;
            font-weight: bolder;
            color:var(--secondry-color);

        }
        ul li a{
            color:var(--secondry-color);

        }
        




    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/">About</a></li>
                <li><a href="/">Services</a></li>
                <li><a href="/">Contact Us</a></li>
            </ul>


        </nav>





    </header>
    
</body>
</html>
