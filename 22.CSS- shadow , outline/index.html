<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadow Outline</title>
    <style>
        *{
            margin: 14;
            padding: 0;
        }
        h1{
            
            border:2px solid black;
            border-right-style: dotted;
            border-left-style: dotted;
            box-shadow: 5px 15px 15px 5px palevioletred;
            padding: 20px;
        }
        .box{
            border: 2px solid black;
            box-shadow: 0 0 15px 0 rgb(208, 165, 208);
            text-shadow: 0 0 15px 0 rgb(238, 130, 238);
            padding: 15px;
            
           
        }
        
    
        



    </style>
</head>
<body>
    <h1>CSS SHADOW OUTLINE</h1>
    <div class="box">
        when its comes too web design css play an enhancing the visual aethestic of a websites among
        with properties that ones array off properties
    </div>
    <p class="box">
        box shadows is a famous css property that enable designer to add shadow effect around an element be 
        it a div image or button 


    </p>
    
</body>
</html>
